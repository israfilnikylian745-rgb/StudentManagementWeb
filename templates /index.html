<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            
            <h1 class="text-center mb-4">Student Management System</h1>

            <div class="d-flex justify-content-between">
    <span>Welcome, {{ username }}</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>

            <div class="d-flex justify-content-between mb-3">
                <a href="/add" class="btn btn-success">+ Add Student</a>
                
                <form method="GET" class="d-flex" style="width: 60%;">
                    <input type="text" name="search" class="form-control me-2" placeholder="Search student name...">
                    <button type="submit" class="btn btn-primary me-2">Search</button>
                    <a href="/" class="btn btn-secondary">Show All</a>
                </form>
            </div>

            <h2 class="mb-3">Student List</h2>

            <table class="table table-striped table-hover table-bordered">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tbody>
    {% for student in students %}
    <tr>
        <td>{{ student["id"] }}</td>
        <td>{{ student["name"] }}</td>
        <td>{{ student["age"] }} years</td>  <!-- HAPA ndio tulikosea -->
        <td>
            <a href="/edit/{{ student['id'] }}" class="btn btn-sm btn-warning">Edit</a>
            <a href="/delete/{{ student['id'] }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</tbody>
            </table>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
