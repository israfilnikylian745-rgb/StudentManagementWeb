<!DOCTYPE html>
<html>
<head>
    <title>Login - Student System</title>
    <style>
        body {font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
        .box {background:white; padding:40px; border-radius:10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 350px;}
        h2 {text-align:center; color:#667eea; margin-bottom:30px;}
        input {width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:5px; box-sizing: border-box;}
        button {width:100%; padding:12px; background:#667eea; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;}
        button:hover {background:#5563d3;}
        .link {text-align:center; margin-top:15px;}
        .link a {color:#667eea; text-decoration:none;}
        .demo {background:#f5f5f5; padding:10px; text-align:center; margin-top:15px; border-radius:5px; font-size:14px;}
    </style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<div class="link">
    Don't have an account? <a href="/register">Sign up here</a>
</div>
<div class="demo">
    <b>Demo:</b> admin / 1234
</div>
</div>
</body>
</html>
